// Quake 3 Arena - generic server config
// Place under <fs_homepath>/<fs_game>/ (e.g. arena/ for Rocket Arena 3).
// Command-line cvars (sv_hostname, net_port, sv_fps, rconpassword, ...) win
// over this file.
set sv_maxclients 16
set g_gametype 0
set timelimit 15
set fraglimit 30
set g_allowVote 1
set sv_floodProtect 1
