// ioquake3 / OSP - 1v1 (tournament)
// Place under <fs_homepath>/osp/ (fs_game = osp). Cvars set on the command
// line (sv_hostname, net_port, sv_fps, ...) take precedence over this file.
set g_gametype 1          // 1 = tournament (1v1)
set sv_maxclients 8       // players + spectators
set timelimit 10
set fraglimit 0
set g_inactivity 0
set g_allowVote 1
set g_warmup 10
