// ioquake3 / OSP - Instagib
// Place under <fs_homepath>/osp/ (fs_game = osp).
// Instagib (railgun-only, one-shot kills) is enabled through OSP weapon/dmflags.
// The exact cvar depends on your OSP build — verify before a tournament.
set g_gametype 0          // works as FFA or team; switch to 3 for team insta
set sv_maxclients 16
set timelimit 15
set fraglimit 30
set osp_instagib 1        // OSP: enable instagib (verify against your OSP version)
set g_allowVote 1
