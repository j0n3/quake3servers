// ioquake3 / OSP - Freeze Tag
// Place under <fs_homepath>/osp/ (fs_game = osp).
// Freeze Tag is an OSP mode; enable it via the OSP gametype cvar below.
// Adjust to your OSP build if the cvar name differs.
set g_gametype 3          // team-based base; OSP layers freeze on top
set osp_gametype 5        // OSP: freeze tag (verify against your OSP version)
set sv_maxclients 16
set timelimit 20
set g_teamForceBalance 1
set g_allowVote 1
