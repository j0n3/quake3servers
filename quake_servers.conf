# Quake3Servers configuration (sourced by the start scripts).
#
# Scalar settings (paths, passwords, FPS, ...) live in quake_servers.env, which
# is also read by systemd. They are pulled in here so the scripts get
# everything from a single `source quake_servers.conf`.
_q3conf_dir="$(dirname "${BASH_SOURCE[0]}")"
source "$_q3conf_dir/quake_servers.env"

# Servers are defined as mode:port1:port2:port3 — each port = one server for
# that mode. These are bash arrays (systemd cannot parse them), so they stay
# out of quake_servers.env.

# IOQ3
Q3SERVERS_IOQ3=(1v1:27970:27971:27972:27973 ffa:27975 instagib:27974)

# Q3
Q3SERVERS_Q3=(arena:27980)

# Quake Live
Q3SERVERS_QL=(CA:27960 CTF:27961)
